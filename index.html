<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
    />
    <title>Document</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body class="d-flex flex-column min-vh-100">
    <nav class="navbar bg-primary" data-bs-theme="dark">
      <div class="container-fluid my-2">
        <a class="navbar-brand mb-2 mb-sm-0" style="font-family: Skip Std B"
          >WHATS THE WEATHER LIKE ?</a
        >
        <form class="d-flex" role="search" id="searchForm">
          <input
            class="form-control me-2"
            type="search"
            placeholder="London, Istanbul..."
            aria-label="Search"
            data-bs-theme="light"
            style="font-family: Skip Std B"
            id="searchBar"
          />
          <button
            class="btn btn-light"
            type="submit"
            style="font-family: Skip Std B"
          >
            Search
          </button>
        </form>
      </div>
    </nav>

    <div
      class="container-fluid bg-light d-flex flex-column flex-grow-1 justify-content-center"
    >
      <div
        class="row row-cols-2 row-cols-sm-3 py-3 d-flex justify-content-center align-items-center"
      >
        <div
          class="col-4 col-sm-2 d-flex justify-content-center align-items-center"
        >
          <img class="img-fluid" id="icon" alt="Wetter Icon" />
        </div>
        <div class="col-8 col-sm-5">
          <div class="row">
            <p id="city" class="display-6 text-uppercase">stadt</p>
          </div>
          <div class="row">
            <p id="temp" class="fs-2">35°C</p>
          </div>
          <div class="row">
            <p id="weather" class="fs-3">Sonnig</p>
          </div>
        </div>
        <div class="col-12 col-sm-5 px-4 px-sm-4">
          <p class="fs-3">Last Searched:</p>
          <ul id="history"></ul>
        </div>
      </div>
    </div>

    <div
      class="container-fluid bg-primary d-flex align-items-center text-white mt-auto"
      style="height: 50px"
    >
      © 2026 Emirkan Aygün
    </div>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script type="module" src="weatherController.js"></script>
  </body>
</html>
